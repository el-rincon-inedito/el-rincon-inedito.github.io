<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivo de Demos Inéditas | The Vault</title>
    <style>
        :root {
            --primary: #00ff88; /* Verde neón para resaltar */
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 5px; }
        p.subtitle { color: #888; font-style: italic; }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* Estilo de la "Tarjeta" de Canción */
        .song-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            transition: transform 0.2s;
        }

        .song-card:hover {
            transform: scale(1.02);
        }

        .song-info h2 { margin-top: 0; color: var(--primary); }

        audio {
            width: 100%;
            margin: 15px 0;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5); /* Hace que el reproductor combine con el modo oscuro */
        }

        .btn-download {
            display: inline-block;
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn-download:hover {
            background: var(--primary);
            color: black;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <header>
        <h1>ARCHIVO INÉDITO</h1>
        <p class="subtitle">Rescatando joyas perdidas y recitales olvidados</p>
    </header>

    <div class="container">
        
        <div class="song-card">
            <div class="song-info">
                <h2>Demo 1: Nombre de la Canción</h2>
                <p><strong>Artista:</strong> Artista Desconocido</p>
                <p><strong>Año/Origen:</strong> Grabación de ensayo, 1994.</p>
            </div>
            <audio controls>
                <source src="demo1.mp3" type="audio/mpeg">
                Tu navegador no soporta el reproductor.
            </audio>
            <a href="demo1.mp3" download class="btn-download">Descargar Archivo</a>
        </div>

        </div>

    <footer>
        <p>&copy; 2026 Miltonnasheee - Divulgación Musical Inédita</p>
    </footer>

</body>
</html>
