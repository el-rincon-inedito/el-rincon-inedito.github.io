<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivo de Inéditos | El Rincón Inédito</title>
    <style>
        :root {
            --primary: #00ff88; 
            --bg: #050505; 
            --card-bg: #101010; 
            --text: #e0e0e0; 
            --border: #222; 
        }

        /* RESET BÁSICO */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding-bottom: 50px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 15px;
        }

        /* ENLACE VOLVER */
        .back-link {
            display: inline-block;
            margin-bottom: 25px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }
        .back-link:hover { color: white; transform: translateX(-3px); }

        /* HEADER */
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 {
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-size: 2rem;
            line-height: 1.2;
        }
        .header p { color: #888; font-size: 0.95rem; line-height: 1.4; max-width: 600px; margin: 0 auto; }

        /* BUSCADOR */
        .search-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
            padding: 0 5px;
        }

        #ineditoSearch {
            width: 100%;
            max-width: 600px;
            padding: 16px 24px;
            border-radius: 40px;
            border: 1px solid #333;
            background: #181818;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        #ineditoSearch:focus {
            border-color: var(--primary);
            background: #1c1c1c;
        }

        /* LISTA */
        .ineditos-list { display: flex; flex-direction: column; gap: 20px; }

        /* TARJETA */
        .inedito-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 25px;
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        .inedito-card:hover {
            border-color: var(--primary);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.1);
            transform: translateY(-3px);
        }

        .date-box {
            border-right: none;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
        .date-box .year { display: block; font-size: 2.2rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .date-box .type { display: block; font-size: 0.8rem; color: #666; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        .info-box { padding: 0; }
        .info-box h3 { margin: 0 0 6px 0; color: white; font-size: 1.3rem; font-weight: bold; }
        .info-box p { margin: 0 0 12px 0; color: #aaa; font-size: 0.95rem; line-height: 1.4; }

        .band-tag {
            display: inline-block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid;
            font-weight: 800;
        }

        .btn-ver {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 14px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            display: inline-block;
            width: 100%;
            text-align: center;
            transition: 0.2s ease;
        }

        .btn-ver:hover {
            background: var(--primary);
            color: black;
            box-shadow: none !important;
        }

        /* PC ADJUSTMENTS */
        @media (min-width: 768px) {
            .inedito-card {
                flex-direction: row;
                grid-template-columns: 140px 1fr 180px;
                display: grid;
                text-align: left;
                align-items: center;
                gap: 0;
            }

            .date-box {
                border-bottom: none;
                border-right: 1px solid #333;
                padding-bottom: 0;
                padding-right: 20px;
                text-align: center;
            }

            .info-box { padding: 0 30px; }
            .action-box { text-align: right; }
            .btn-ver { width: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← Inicio</a>

    <div class="header">
        <h1>Archivo General de Inéditos</h1>
        <p>Explorá demos de estudio, rarezas y grabaciones encontradas fuera de los álbumes oficiales.</p>
    </div>

    <div class="search-container">
        <input type="text" id="ineditoSearch" placeholder="Buscar por artista, año o canción..." onkeyup="filterIneditos()">
    </div>

    <div class="ineditos-list" id="listaIneditos">

        <div class="inedito-card" data-search="wos abacanado ds3 rap 2016 buenos aires inedito">
            <div class="date-box">
                <span class="year">2016</span>
                <span class="day">Studio / Demo</span>
            </div>
            <div class="info-box">
                <h3>Abacanado</h3>
                <p>Grabación temprana de la etapa de Desastres Squad (DS3).</p>
                <span class="band-tag" style="color: #00ff88; border-color: #00ff88; background: rgba(0, 255, 136, 0.05);">Wos</span>
            </div>
            <div class="action-box">
                <a href="Ineditos/Wos/wos-abacanado.html" class="btn-ver">Ver Detalles</a>
            </div>
        </div>

        </div>
</div>

<script>
    function filterIneditos() {
        let input = document.getElementById('ineditoSearch').value.toLowerCase();
        let listContainer = document.getElementById('listaIneditos');
        let cards = listContainer.getElementsByClassName('inedito-card');

        for (let i = 0; i < cards.length; i++) {
            let filterData = cards[i].getAttribute('data-search');
            if (filterData.toLowerCase().includes(input)) {
                cards[i].style.display = ""; 
            } else {
                cards[i].style.display = "none";
            }
        }
    }
</script>

</body>
</html>
