<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivo Inédito | Wos - El Rincón Inédito</title>
    <style>
        :root {
            --primary: #00ff88; /* Cambiado de cian a verde Spinetta */
            --bg: #050505;
            --card-bg: #121212;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-weight: bold; }
        
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { color: var(--primary); letter-spacing: 3px; text-transform: uppercase; }
        .header p { color: #666; font-style: italic; }

        .conciertos-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Ficha de Material */
        .concierto-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 15px;
            display: grid;
            grid-template-columns: 120px 1fr 180px;
            align-items: center;
            padding: 20px;
            transition: 0.3s;
        }

        .concierto-card:hover {
            border-color: var(--primary);
            background: #161616;
        }

        .date-box {
            text-align: center;
            border-right: 1px solid #333;
        }
        .date-box .year { display: block; font-size: 1.2rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        .date-box .day { display: block; font-size: 0.8rem; color: #666; }

        .info-box { padding: 0 25px; }
        .info-box h3 { margin: 0 0 5px 0; color: white; font-size: 1.2rem; }
        .info-box p { margin: 0; color: #888; font-size: 0.9rem; }
        .band-tag { 
            display: inline-block; 
            margin-top: 8px; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            color: var(--primary); 
            border: 1px solid var(--primary);
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(0, 255, 136, 0.05); /* Fondo verde traslúcido */
        }

        .action-box { text-align: right; }
        .btn-ver {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-ver:hover {
            background: var(--primary);
            color: black;
        }

        @media (max-width: 768px) {
            .concierto-card {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 15px;
            }
            .date-box { border-right: none; border-bottom: 1px solid #333; padding-bottom: 15px; }
            .action-box { text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="wos.html" class="back-link">← Volver</a>
    
    <div class="header">
        <h1>Archivo Inédito</h1>
        <p>Demos de estudio, descartes y grabaciones no publicadas.</p>
    </div>

    <div class="conciertos-list">

        



        <div class="concierto-card">
            <div class="date-box">
                <span class="year">1968</span>
            </div>
            <div class="info-box">
                <h3>Grabaciones Encontradas</h3>
                <p>Junto a Del Guercio</p>
                <span class="band-tag">Luis Alberto Spinetta</span>
            </div>
            <div class="action-box">
                <a href="../../Ineditos/Spinetta/grabaciones-spinetta-1968.html" class="btn-ver">Ver Detalles</a>
            </div>
        </div>

        

    </div>
</div>

</body>
</html>
